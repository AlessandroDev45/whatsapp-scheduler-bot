name: Keep Evolution API Awake

on:
  schedule:
    # Executa a cada 10 minutos (Render free tier dorme após 15 min de inatividade)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite execução manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Evolution API
        run: |
          echo "🔔 Acordando Evolution API..."
          curl -X GET "${{ secrets.EVOLUTION_API_URL }}/instance/fetchInstances" \
            -H "apikey: ${{ secrets.EVOLUTION_API_KEY }}" \
            -w "\nStatus: %{http_code}\n"
          echo "✅ Ping enviado!"

