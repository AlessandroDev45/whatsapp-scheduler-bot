name: 🤖 Run WhatsApp Bot

on:
  # Reinicia automaticamente a cada 5h30 (job dura até 6h no GitHub Actions)
  schedule:
    - cron: '0 */5 * * *'

  # Permite iniciar manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5h30 — antes do limite de 6h do GitHub Actions

    steps:
      # ── 1. Código ────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────
      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: whatsapp-scheduler-bot/baileys-server/package-lock.json

      # ── 3. Dependências ──────────────────────────────────────
      - name: Instalar dependências
        working-directory: whatsapp-scheduler-bot/baileys-server
        run: npm ci --only=production

      # ── 4. Restaurar sessão WhatsApp do cache ────────────────
      #    Na primeira execução não haverá cache — o bot vai gerar um QR Code
      #    visível nos logs desta ação. Escaneie pelo GitHub → Actions → log do job.
      - name: Restaurar sessão WhatsApp
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: whatsapp-scheduler-bot/baileys-server/auth_info
          key: whatsapp-auth-session
          restore-keys: whatsapp-auth-session

      - name: Status da sessão
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Sessão WhatsApp restaurada do cache — sem necessidade de QR Code"
          else
            echo "⚠️  Nenhuma sessão anterior. O bot vai gerar um QR Code nos logs."
            echo "    Escaneie-o com o WhatsApp para autenticar."
          fi

      # ── 5. Rodar o bot ───────────────────────────────────────
      - name: Iniciar bot WhatsApp
        working-directory: whatsapp-scheduler-bot/baileys-server
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_WEBHOOK_URL: ${{ secrets.SUPABASE_WEBHOOK_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          BOT_INSTANCE_NAME: ${{ secrets.BOT_INSTANCE_NAME || 'whatsapp_bot' }}
          AUTH_INFO_PATH: ./auth_info
          PORT: 3000
        # O bot roda indefinidamente — o timeout do job acima (330min) vai encerrá-lo
        # O `|| true` garante que o step não falhe quando o job for cancelado pelo timeout
        run: node src/index.js || true

      # ── 6. Salvar sessão WhatsApp no cache ───────────────────
      #    Roda SEMPRE (mesmo se o bot parar por erro), para preservar a sessão
      - name: Salvar sessão WhatsApp no cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: whatsapp-scheduler-bot/baileys-server/auth_info
          key: whatsapp-auth-session-${{ github.run_id }}
