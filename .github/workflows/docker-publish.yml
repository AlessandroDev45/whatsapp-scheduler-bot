name: Build & Publish Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'whatsapp-scheduler-bot/bot/**'
  workflow_dispatch:   # Permite rodar manualmente pelo GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/whatsapp-scheduler-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login no GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tag, label)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./whatsapp-scheduler-bot/bot
          file: ./whatsapp-scheduler-bot/bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────────────
  # JOB OPCIONAL: Deploy automático via SSH em VPS próprio
  # Para ativar: configure os secrets DEPLOY_HOST, DEPLOY_USER
  # e DEPLOY_KEY no repositório (Settings → Secrets → Actions)
  # ─────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}   # Só roda se DEPLOY_ENABLED=true nas Variables do repo

    steps:
      - name: Deploy via SSH no servidor
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/whatsapp-scheduler-bot/bot

            # Baixar imagem mais recente
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/whatsapp-scheduler-bot:latest

            # Reiniciar apenas o container (preserva volume da sessão WhatsApp)
            docker compose pull
            docker compose up -d --no-deps whatsapp-bot

            echo "✅ Deploy concluído!"
