name: 🤖 Run WhatsApp Bot

on:
  # Reinicia automaticamente a cada 5h (job dura até 6h no GitHub Actions)
  schedule:
    - cron: '0 */5 * * *'

  # Permite iniciar manualmente pelo painel do GitHub
  workflow_dispatch:
    inputs:
      force_new_session:
        description: 'Forçar nova sessão WhatsApp (gerar novo QR Code)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# CRÍTICO: Impedir que 2 bots rodem ao mesmo tempo (causa "Connection Closed")
concurrency:
  group: whatsapp-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 5h30 — antes do limite de 6h do GitHub Actions

    steps:
      # ── 1. Código ────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────
      - name: Instalar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Dependências ──────────────────────────────────────
      - name: Instalar dependências
        working-directory: whatsapp-scheduler-bot/bot
        run: npm ci --only=production

      # ── 4. Restaurar sessão WhatsApp do cache ────────────────
      - name: Restaurar sessão WhatsApp
        if: ${{ github.event.inputs.force_new_session != 'true' }}
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: whatsapp-scheduler-bot/bot/auth_info
          key: whatsapp-auth-session
          restore-keys: whatsapp-auth-session

      - name: Status da sessão
        run: |
          if [ "${{ github.event.inputs.force_new_session }}" == "true" ]; then
            echo "🔄 FORÇANDO NOVA SESSÃO — QR Code será gerado nos logs"
            rm -rf whatsapp-scheduler-bot/bot/auth_info
          elif [ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Sessão WhatsApp restaurada do cache"
          else
            echo "⚠️  Nenhuma sessão anterior — o bot vai gerar QR Code nos logs."
          fi

      # ── 5. Instalar cloudflared (túnel HTTPS público para o bot) ──
      - name: Instalar cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      # ── 6. Iniciar bot em background ─────────────────────────
      - name: Iniciar bot WhatsApp (background)
        working-directory: whatsapp-scheduler-bot/bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_WEBHOOK_URL: ${{ secrets.SUPABASE_WEBHOOK_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          BOT_INSTANCE_NAME: ${{ secrets.BOT_INSTANCE_NAME || 'whatsapp_bot' }}
          ADMIN_NUMBER: ${{ secrets.ADMIN_NUMBER }}
          AUTH_INFO_PATH: ./auth_info
          PORT: 3000
        run: |
          node src/index.js > /tmp/bot.log 2>&1 &
          echo "BOT_PID=$!" >> $GITHUB_ENV
          echo "Bot iniciado com PID $!"
          # Aguardar porta 3000 subir (até 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Bot respondendo na porta 3000"
              break
            fi
            echo "⏳ Aguardando bot... ($i/30)"
            sleep 1
          done

      # ── 7. Criar túnel Cloudflare e atualizar Edge Function ──
      - name: Criar túnel público (Cloudflare Quick Tunnel)
        run: |
          # Iniciar túnel em background e capturar URL
          cloudflared tunnel --url http://localhost:3000 --no-autoupdate \
            > /tmp/cloudflared.log 2>&1 &
          echo "TUNNEL_PID=$!" >> $GITHUB_ENV

          # Aguardar URL aparecer nos logs (até 30s)
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9\-]+\.trycloudflare\.com' /tmp/cloudflared.log 2>/dev/null | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Túnel criado: $TUNNEL_URL"
              break
            fi
            echo "⏳ Aguardando URL do túnel... ($i/30)"
            sleep 1
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Falha ao obter URL do túnel. Logs:"
            cat /tmp/cloudflared.log
            exit 1
          fi

          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

          # Atualizar secret BOT_API_URL na Edge Function do Supabase
          echo "🔄 Atualizando BOT_API_URL na Edge Function..."
          echo "🔗 Nova URL do bot: $TUNNEL_URL"

          # Método 1: Tentar via Edge Function __secrets (pode não funcionar)
          HTTP_STATUS=$(curl -s -o /tmp/supabase_resp.txt -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/webhook-whatsapp/__secrets" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"BOT_API_URL\",\"value\":\"$TUNNEL_URL\"}" || true)
          echo "Método 1 (Edge Function __secrets) status: $HTTP_STATUS"
          cat /tmp/supabase_resp.txt 2>/dev/null || true
          echo ""

          # Método 2: Usar Management API para setar secret no projeto
          if [ -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && [ -n "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then
            HTTP_STATUS=$(curl -s -o /tmp/sb_secret_resp.txt -w "%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/secrets" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "[{\"name\":\"BOT_API_URL\",\"value\":\"$TUNNEL_URL\"}]")
            echo "Método 2 (Management API) status: $HTTP_STATUS"
            cat /tmp/sb_secret_resp.txt 2>/dev/null || true
            echo ""
          else
            echo "⚠️ SUPABASE_ACCESS_TOKEN ou SUPABASE_PROJECT_ID não configurados!"
            echo "⚠️ O BOT_API_URL NÃO será atualizado automaticamente."
            echo "⚠️ A Edge Function não vai conseguir responder aos comandos!"
          fi

          # Método 3: Verificar se o túnel está acessível
          echo "🔍 Testando acesso ao túnel..."
          HEALTH=$(curl -sf "$TUNNEL_URL/health" 2>/dev/null || echo "FALHOU")
          echo "Health check via túnel: $HEALTH"

      # ── 8. Manter bot rodando até timeout ────────────────────
      - name: Verificar se Edge Function consegue chamar o bot
        run: |
          echo "🔍 Testando comunicação Edge Function → Bot..."
          echo "   Tunnel URL: $TUNNEL_URL"
          
          # Testar se o tunnel responde
          HEALTH=$(curl -sf "$TUNNEL_URL/health" 2>&1 || echo "ERRO")
          echo "   Health check: $HEALTH"
          
          # Testar se o Supabase pode enviar webhook
          echo ""
          echo "🔍 Testando se Edge Function responde..."
          EDGE_RESP=$(curl -sf "${{ secrets.SUPABASE_URL }}/functions/v1/webhook-whatsapp" \
            -X OPTIONS \
            -H "Origin: https://test.com" 2>&1 || echo "ERRO")
          echo "   Edge Function OPTIONS: $EDGE_RESP"
          
          echo ""
          echo "✅ URLs configuradas:"
          echo "   Bot API (tunnel): $TUNNEL_URL"
          echo "   Webhook: ${{ secrets.SUPABASE_URL }}/functions/v1/webhook-whatsapp"

      - name: Manter bot ativo
        run: |
          echo "🤖 Bot rodando com túnel: $TUNNEL_URL"
          echo "⏳ Mantendo ativo por ~5h15min..."
          # Mostrar logs do bot periodicamente e manter vivo
          ( tail -f /tmp/bot.log & )
          sleep 18900  # 5h15min
          echo "⏱️ Tempo esgotado — encerrando"

      # ── 9. Salvar sessão WhatsApp no cache ───────────────────
      - name: Verificar saúde da sessão antes de salvar
        id: check-session
        if: always()
        run: |
          AUTH_DIR="whatsapp-scheduler-bot/bot/auth_info"
          if [ -f "$AUTH_DIR/creds.json" ]; then
            # Verificar se o bot estava em loop de reconexão (sessão corrompida)
            BAD_MAC_COUNT=$(grep -c "Bad MAC" /tmp/bot.log 2>/dev/null || echo "0")
            if grep -c "SESSÃO CORROMPIDA DETECTADA" /tmp/bot.log 2>/dev/null; then
              echo "🔴 Sessão corrompida detectada nos logs — NÃO salvando cache"
              echo "healthy=false" >> $GITHUB_OUTPUT
            elif [ "$BAD_MAC_COUNT" -gt 10 ]; then
              echo "🔴 Muitos Bad MAC errors ($BAD_MAC_COUNT) — sessão corrompida, NÃO salvando"
              echo "healthy=false" >> $GITHUB_OUTPUT
            else
              echo "✅ Sessão parece saudável (Bad MAC: $BAD_MAC_COUNT) — salvando cache"
              echo "healthy=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Nenhuma sessão encontrada"
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Salvar sessão WhatsApp no cache
        uses: actions/cache/save@v4
        if: always() && steps.check-session.outputs.healthy == 'true'
        with:
          path: whatsapp-scheduler-bot/bot/auth_info
          key: whatsapp-auth-session-${{ github.run_id }}
